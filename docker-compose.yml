version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: medisync_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: medisync_db
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: medisync_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medisync_backend
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB_NAME: medisync_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      USE_MOCK_AI: ${USE_MOCK_AI:-false}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn medisync.api.app:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongo_data:
